apis:
  - aid: tesla-motors:owner-api
    name: Tesla Owner API
    description: The Tesla Owner API (unofficial) provides access to Tesla vehicle telemetry, state data, and remote command
      capabilities for personal vehicles. Supports vehicle listing, state retrieval (charge, climate, drive, vehicle config),
      and commands including wake-up, door lock/unlock, climate control, charging, trunk control, and media playback.
