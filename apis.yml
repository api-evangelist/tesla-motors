aid: tesla-motors
name: Tesla Motors
description: Tesla, Inc. (formerly Tesla Motors, Inc.) is an American electric vehicle and clean energy company that designs
  and manufactures electric cars, battery energy storage systems, solar panels, and related products. The Tesla Owner API
  provides programmatic access to Tesla vehicles for monitoring state, controlling climate, locking/unlocking doors, managing
  charging, and executing remote commands.
