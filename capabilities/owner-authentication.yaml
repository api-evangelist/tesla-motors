naftiko: 1.0.0-alpha2
info:
  label: Tesla Motors Owner API — Authentication
  description: 'Tesla Motors Owner API — Authentication. 1 operations. Lead operation: Tesla Get an Access Token. Self-contained
    Naftiko capability covering one Tesla Motors business surface.'
  tags:
  - Tesla Motors
  - Authentication
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TESLA_MOTORS_API_KEY: TESLA_MOTORS_API_KEY
capability:
  consumes:
  - type: http
    namespace: owner-authentication
    baseUri: https://owner-api.teslamotors.com
    description: Tesla Motors Owner API — Authentication business capability. Self-contained, no shared references.
    resources:
    - name: oauth-token
      path: /oauth/token
      operations:
      - name: createoauthtoken
        method: POST
        description: Tesla Get an Access Token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: rest
    namespace: owner-authentication-rest
    port: 8080
    description: REST adapter for Tesla Motors Owner API — Authentication. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/oauth/token
      name: oauth-token
      description: REST surface for oauth-token.
      operations:
      - method: POST
        name: createoauthtoken
        description: Tesla Get an Access Token
        call: owner-authentication.createoauthtoken
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: owner-authentication-mcp
    port: 9090
    transport: http
    description: MCP adapter for Tesla Motors Owner API — Authentication. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: tesla-get-access-token
      description: Tesla Get an Access Token
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: owner-authentication.createoauthtoken
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
